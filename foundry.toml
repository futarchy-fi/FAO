[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./deployments.json" }]

remappings = [
    # Use SnapshotX-pinned OpenZeppelin versions (v4.x) to avoid OZ v5 init signature mismatches
    "@openzeppelin/contracts-upgradeable/=lib/sx-evm/lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/sx-evm/lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/=lib/sx-evm/lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",

    # Snapshot X EVM (vendored as a Foundry lib)
    "sx/=lib/sx-evm/src/",
    # Context-scoped remapping: sx-evm internal files use bare `src/` imports
    # (their own project layout). Apply that remapping only when compiling files
    # under lib/sx-evm/ so it doesn't clobber our project's own src/ paths.
    "lib/sx-evm/:src/=lib/sx-evm/src/",
    "forge-gas-snapshot/=lib/sx-evm/lib/forge-gas-snapshot/src/",
    "@prb/test/=lib/sx-evm/lib/prb-test/src/",
    "@zodiac/=lib/sx-evm/lib/zodiac/contracts/",
    "@gnosis.pm/safe-contracts/=lib/sx-evm/lib/safe-contracts/",
    "@murky/=lib/sx-evm/lib/murky/src/",
    "@herodotus-evm-v2/=lib/sx-evm/lib/herodotus-evm-v2/src/"
]

[lint]
exclude_lints = ["unsafe-typecast"]
ignore = ["lib/sx-evm/**"]

# CI profile referenced by .github/workflows/test.yml.
# Without this block, FOUNDRY_PROFILE=ci silently fell through to default —
# Topic 4 D5 (CI gating + reproducibility) flagged that gap.
[profile.ci]
verbosity = 3
fuzz = { runs = 1000 }                          # default 256; CI gets more cycles
invariant = { runs = 100, depth = 50 }          # exercise the invariant suites
fail_on_revert = true                            # surface unhandled reverts as failures

# Verifier-friendly profile: opts into solc's built-in SMTChecker for the
# top-level invariant pass. Slower; intended as a nightly job + manual
# investigation aid, not per-PR. Lifts Topic 3 D7 (verifiability hooks).
[profile.smtchecker]
via_ir = true
optimizer = true
optimizer_runs = 200
model_checker = { engine = "chc", timeout = 30_000, targets = ["assert", "underflow", "overflow", "divByZero", "balance"], contracts = { "src/InstanceSale.sol" = ["InstanceSale"], "src/FAOTwapResolver.sol" = ["FAOTwapResolver"] } }

# Halmos symbolic test profile. Halmos transpiles Foundry tests to
# symbolic execution. Run with: `halmos --match-test invariant_*`.
# (Halmos itself is invoked outside foundry; this profile is here so the
# regular forge build emits the artifacts halmos consumes.)
[profile.halmos]
via_ir = true
optimizer = false                             # halmos prefers unoptimized bytecode
optimizer_runs = 0

[rpc_endpoints]
gnosis = "https://rpc.gnosischain.com"

# [etherscan]
# gnosis = { key = "${GNOSISSCAN_API_KEY}", url = "https://api.gnosisscan.io/api" }

[fmt]
line_length = 100
number_underscore = "thousands"
wrap_comments = true
