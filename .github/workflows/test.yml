name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive
          ssh-key: ${{ secrets.FLM_SUBMODULE_SSH_KEY }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Test FLM code-hash generator
        run: python3 -m unittest tools.test_flm_code_hashes

      - name: Test FLM deployment manifest verifier
        run: python3 -m unittest tools.test_flm_deployment

      - name: Verify sealed FLM code and compiler evidence
        run: python3 tools/flm_deployment.py prepare-build-info

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
