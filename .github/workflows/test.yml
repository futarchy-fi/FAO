name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive
          ssh-key: ${{ secrets.FLM_SUBMODULE_SSH_KEY }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.0

      - name: Show Forge version
        run: forge --version

      - name: Test deployment evidence tools
        run: python3 -m unittest discover -s tools -p 'test_*.py' -v

      - name: Verify sealed FLM code and compiler evidence
        run: python3 tools/flm_deployment.py prepare-build-info

      - name: Verify sealed economic-core code and compiler evidence
        run: python3 tools/economic_code_hashes.py --check

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run wind-tunnel Anvil keeper race
        run: python3 -m tools.windtunnel.anvil_drill race --output /tmp/windtunnel-race.json

      - name: Run Forge tests
        run: forge test -vvv
