name: Capture screenshots

# Captures 6 pages × 2 viewports = 12 PNGs from the deployed sites and
# commits them back to audit/screenshots/. Drives the multimodal T1.D6
# evaluator which reads these PNGs.
#
# Triggered on push to site-testnet/** or manually.

permissions:
  contents: write   # to commit screenshots back

on:
  push:
    paths:
      - "site-testnet/**"
      - "site-ops/fao/**"
      - "scripts/capture-screenshots.sh"
      - ".github/workflows/screenshots.yml"
  schedule:
    - cron: "31 5 * * *"  # daily 05:31 UTC
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + chromium with system deps
        run: |
          npm install --package-lock=false @playwright/test
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          set -euo pipefail
          if FAO_SITE_URL=https://fao-testnet.pages.dev/ bash scripts/capture-screenshots.sh; then
            exit 0
          fi

          echo "::warning::deployed capture failed; falling back to checked-out site-testnet/"
          python3 -m http.server 8766 --directory site-testnet &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in {1..20}; do
            if node -e "fetch('http://127.0.0.1:8766/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"; then
              break
            fi
            sleep 0.5
          done

          FAO_SITE_URL=http://127.0.0.1:8766/ bash scripts/capture-screenshots.sh

      - name: Commit screenshots back
        run: |
          git config user.email "fleet-autocommit@futarchy.fi"
          git config user.name "fleet-autocommit"
          git add audit/screenshots/
          if git diff --cached --quiet; then
            echo "no screenshot changes"; exit 0
          fi
          git commit -m "chore(audit): refresh audit/screenshots/ via CI"
          git push
