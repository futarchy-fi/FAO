name: Deploy testnet site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'site-testnet/**'
      - 'deployments.json'
      - 'scripts/check-deployments-sync.sh'
      - '.github/workflows/deploy-testnet.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-testnet
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    environment:
      name: cloudflare-pages
      url: https://fao-testnet.pages.dev/
    steps:
      - uses: actions/checkout@v4
      - name: Check deployment manifest sync
        run: bash scripts/check-deployments-sync.sh
      - name: Note missing Wrangler credentials
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "::notice::Skipping Wrangler deploy because Cloudflare Pages secrets are not configured; use the Cloudflare Git integration or add the secrets."
      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site-testnet --project-name=fao-testnet --branch=main
