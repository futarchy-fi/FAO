</style></defs><rect width="1000" height="430" fill="#ffffff"/><rect x="540" y="150" width="365" height="200" fill="#eef2f5"/><text x="60" y="56" font-size="29" fill="#1a1a1a" font-weight="700" text-anchor="start">Strength is a separate dimension</text><text x="60" y="86" font-size="17" fill="#555555" font-weight="400" text-anchor="start">what an assurance system can hold against — not what it holds</text><line x1="90" y1="300" x2="905" y2="300" stroke="#1a1a1a" stroke-width="2.2"/><line x1="905" y1="160" x2="905" y2="345" stroke="#1a1a1a" stroke-width="2.6"/><text x="895" y="168" font-size="14" fill="#555555" font-weight="400" text-anchor="end">the limits</text><text x="895" y="185" font-size="14" fill="#555555" font-weight="400" text-anchor="end">of physics</text><line x1="540" y1="150" x2="540" y2="345" stroke="#8a8a8a" stroke-width="1.5" stroke-dasharray="5,5"/><text x="540" y="142" font-size="15" fill="#555555" font-weight="400" text-anchor="middle" font-style="italic">the human ceiling</text><text x="722.5" y="172" font-size="19" fill="#2c3e50" font-weight="700" text-anchor="middle">supersystems</text><text x="722.5" y="190" font-size="14" fill="#555555" font-weight="400" text-anchor="middle">strength past the human ceiling</text><line x1="160" y1="300" x2="160" y2="308" stroke="#1a1a1a" stroke-width="1.6"/><text x="160" y="328" font-size="15" fill="#555555" font-weight="400" text-anchor="middle">a toddler</text><line x1="300" y1="300" x2="300" y2="308" stroke="#1a1a1a" stroke-width="1.6"/><text x="300" y="328" font-size="15" fill="#555555" font-weight="400" text-anchor="middle">a locksmith</text><line x1="440" y1="300" x2="440" y2="308" stroke="#1a1a1a" stroke-width="1.6"/><text x="440" y="328" font-size="15" fill="#555555" font-weight="400" text-anchor="middle">a state</text><line x1="700" y1="300" x2="700" y2="308" stroke="#1a1a1a" stroke-width="1.6"/><text x="700" y="328" font-size="15" fill="#555555" font-weight="400" text-anchor="middle">a superintelligence</text><text x="700" y="347" font-size="13" fill="#8a8a8a" font-weight="400" text-anchor="middle">(a vast range of minds)</text><circle cx="160" cy="300" r="7" fill="#2c3e50"/><line x1="160" y1="288" x2="160" y2="258" stroke="#8a8a8a" stroke-width="1"/><text x="160" y="250" font-size="14" fill="#1a1a1a" font-weight="400" text-anchor="middle">a cheap lock</text><circle cx="320" cy="300" r="7" fill="#2c3e50"/><line x1="320" y1="288" x2="320" y2="258" stroke="#8a8a8a" stroke-width="1"/><text x="320" y="250" font-size="14" fill="#1a1a1a" font-weight="400" text-anchor="middle">a bank vault</text><line x1="560" y1="300" x2="820" y2="300" stroke="#8a8a8a" stroke-width="1.4" stroke-dasharray="4,4"/><line x1="560" y1="295" x2="560" y2="305" stroke="#8a8a8a" stroke-width="1.4"/><line x1="820" y1="295" x2="820" y2="305" stroke="#8a8a8a" stroke-width="1.4"/><circle cx="670" cy="300" r="8" fill="#ffffff" stroke="#2c3e50" stroke-width="2.2" stroke-dasharray="3,3"/><line x1="670" y1="288" x2="670" y2="234" stroke="#8a8a8a" stroke-width="1"/><text x="670" y="226" font-size="14" fill="#1a1a1a" font-weight="700" text-anchor="middle">AES, RSA</text><text x="670" y="243" font-size="13" fill="#555555" font-weight="400" text-anchor="middle">only conjectured —</text><text x="670" y="260" font-size="13" fill="#555555" font-weight="400" text-anchor="middle">could sit anywhere</text><circle cx="905" cy="300" r="7" fill="#2c3e50"/><line x1="905" y1="288" x2="905" y2="258" stroke="#8a8a8a" stroke-width="1"/><text x="897" y="244" font-size="14" fill="#1a1a1a" font-weight="700" text-anchor="end">one-time pad</text><text x="897" y="261" font-size="13" fill="#555555" font-weight="400" text-anchor="end">holds against anything</text></svg>