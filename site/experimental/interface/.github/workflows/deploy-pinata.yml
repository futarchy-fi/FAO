name: Deploy to Pinata IPFS

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      ipfs_cid: ${{ steps.upload.outputs.hash }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Upload to Pinata
        id: upload
        uses: anantaramdas/ipfs-pinata-deploy-action@v1.6.4
        with:
          pin-name: 'fao-interface-${{ github.sha }}'
          path: './out'
          pinata-api-key: ${{ secrets.PINATA_API_KEY }}
          pinata-secret-api-key: ${{ secrets.PINATA_SECRET_KEY }}

      - name: Output IPFS Hash
        run: |
          echo "## 🚀 Deployed to IPFS!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IPFS CID:** \`${{ steps.upload.outputs.hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Gateway URL:** https://gateway.pinata.cloud/ipfs/${{ steps.upload.outputs.hash }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📋 Copy the CID above to use in the **Update ENS Contenthash** workflow" >> $GITHUB_STEP_SUMMARY

      - name: Save CID to artifact
        run: echo "${{ steps.upload.outputs.hash }}" > ipfs_cid.txt
      
      - name: Upload CID artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipfs-cid
          path: ipfs_cid.txt
          retention-days: 30
